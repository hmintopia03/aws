server {
    listen 80;
    server_name hyemincho.dev www.hyemincho.dev;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name hyemincho.dev www.hyemincho.dev;

    ssl_certificate /etc/letsencrypt/live/hyemincho.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hyemincho.dev/privkey.pem;

    location / {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}